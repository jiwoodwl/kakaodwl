<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* CSS: 화면 레이아웃 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* 왼쪽 검색창 섹션 */
        .sidebar {
            width: 350px;
            height: 100%;
            padding: 20px;
            background-color: #f8f9fa;
            overflow-y: auto;
            border-right: 1px solid #ddd;
            z-index: 10;
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            width: 80%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .search-box button {
            padding: 10px;
            background-color: #fee500; /* 카카오 노란색 */
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* 오른쪽 지도 섹션 */
        .map-area {
            flex: 1; /* 남은 공간 모두 차지 */
            height: 100%;
        }

        #placesList li {
            list-style: none;
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        #placesList li:hover {
            background-color: #e9ecef;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 왼쪽: 검색 및 리스트 -->
    <div class="sidebar">
        <div class="search-box">
            <input type="text" id="keyword" placeholder="장소를 입력하세요">
            <button onclick="searchPlaces()">검색</button>
        </div>
        <hr>
        <ul id="placesList"></ul>
    </div>

    <!-- 오른쪽: 지도 -->
    <div id="map" class="map-area"></div>
</div>

<!-- 카카오맵 API 라이브러리 불러오기 (services 라이브러리 포함) -->
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=ecb7dbd146bceb26d523cb008b35e8eb&libraries=services"></script>

<script>
    // JavaScript: 지도 제어 및 검색 로직
    let map;
    let ps; // 장소 검색 객체
    let infowindow; // 정보창 객체

    // 1. 페이지 로드 시 실행 (지도가 제대로 로드된 후 실행되도록 함)
    kakao.maps.load(function() {
        const mapContainer = document.getElementById('map');
        const mapOption = {
            center: new kakao.maps.LatLng(37.566826, 126.9786567), // 위치 권한 허용 전 기본 중심 좌표 (서울시청)
            level: 5 // 확대 레벨
        };

        // 지도 생성
        map = new kakao.maps.Map(mapContainer, mapOption);
        
        // 장소 검색 객체 생성
        ps = new kakao.maps.services.Places();
        
        // 검색 결과 클릭 시 띄울 정보창 생성
        infowindow = new kakao.maps.InfoWindow({zIndex: 1});

        // 2. 현재 위치 가져오기 (위치 권한 요청)
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const lat = position.coords.latitude; // 위도
                const lon = position.coords.longitude; // 경도
                const locPosition = new kakao.maps.LatLng(lat, lon);

                // 지도의 중심을 현재 위치로 이동
                map.setCenter(locPosition);
                
                // 현재 위치에 마커 표시 (선택 사항)
                const marker = new kakao.maps.Marker({
                    map: map,
                    position: locPosition
                });
            });
        } else {
            alert("이 브라우저에서는 위치 정보를 사용할 수 없습니다.");
        }
    });

    // 장소 검색 실행 함수
    function searchPlaces() {
        const keyword = document.getElementById('keyword').value;

        if (!keyword.replace(/^\s+|\s+$/g, '')) {
            alert('키워드를 입력해주세요!');
            return;
        }

        // 카카오맵 키워드 검색 서비스 실행
        ps.keywordSearch(keyword, placesSearchCB);
    }

    // 장소 검색 결과 콜백 함수
    function placesSearchCB(data, status, pagination) {
        if (status === kakao.maps.services.Status.OK) {
            displayPlaces(data);
        } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
            alert('검색 결과가 존재하지 않습니다.');
        } else if (status === kakao.maps.services.Status.ERROR) {
            alert('검색 결과 중 오류가 발생했습니다.');
        }
    }

    // 검색된 장소 목록을 화면에 표시하는 함수
    function displayPlaces(places) {
        const listEl = document.getElementById('placesList');
        const bounds = new kakao.maps.LatLngBounds();
        
        // 기존 검색 결과 제거
        listEl.innerHTML = '';

        for (let i = 0; i < places.length; i++) {
            const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
            const itemEl = document.createElement('li');
            
            itemEl.innerHTML = `<strong>${places[i].place_name}</strong><br><span>${places[i].address_name}</span>`;
            
            // 목록 클릭 시 지도를 해당 위치로 이동
            itemEl.onclick = function() {
                map.panTo(placePosition);
                displayInfowindow(places[i]);
            };

            listEl.appendChild(itemEl);
            bounds.extend(placePosition);
        }

        // 검색된 장소들이 모두 보이도록 지도 범위 조정
        map.setBounds(bounds);
    }

    // 정보창을 지도에 표시하는 함수
    function displayInfowindow(place) {
        const content = `<div style="padding:5px;font-size:12px;">${place.place_name}</div>`;
        infowindow.setContent(content);
        infowindow.open(map, new kakao.maps.Marker({
            position: new kakao.maps.LatLng(place.y, place.x),
            map: map
        }));
    }
</script>

</body>
</html>
